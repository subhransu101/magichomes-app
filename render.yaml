services:
  - type: web
    name: magichomes-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/properties.db
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
